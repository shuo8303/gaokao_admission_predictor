<!doctype html>
<html lang="zh-CN">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1">

</head>

                        <p><span>姓名</span> Shuo</p>
                        <p><span>邮箱</span> <a href="mailto:shuo8303@gmail.com">shuo8303@gmail.com</a></p>
                        <p><span>GitHub</span> <a href="https://github.com/shuo8303" target="_blank" rel="noreferrer">shuo8303</a></p>

                </details>
