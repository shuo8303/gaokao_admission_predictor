<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}浙江省高考录取预测系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="nav-container" aria-label="主导航">
            <a class="brand" href="{{ url_for('main.index') }}">浙江高考录取预测</a>
            <span class="nav-note">普通类一段平行投档数据预测</span>
        </nav>
    </header>

    {% block content %}{% endblock %}

    <footer class="site-footer">
        <p>预测结果仅供参考，最终结果以浙江省教育考试院公布为准。</p>
    </footer>
</body>
</html>
