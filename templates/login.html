{% extends "base.html" %}

{% block title %}登录 - 浙江省高考录取预测系统{% endblock %}

{% block content %}
<main class="page-shell auth-page">
    <section class="page-heading">
        <p class="eyebrow">账号登录</p>
        <h1>手机号验证码登录</h1>
        <p>账号 ID 即手机号。无需设置密码，填写昵称并获取短信验证码后即可登录使用预测功能。</p>
    </section>

    <section class="form-panel auth-panel" aria-labelledby="login-title">
        <h2 id="login-title">登录或注册</h2>

        <form class="auth-form" method="post">
            <input type="hidden" name="next" value="{{ next_url }}">
            <label>
                <span>昵称</span>
                <input
                    type="text"
                    name="nickname"
                    required
                    maxlength="20"
                    value="{{ nickname or '' }}"
                    placeholder="例如：小陈"
                    autocomplete="nickname"
                >
            </label>
            <label>
                <span>手机号</span>
                <input
                    type="tel"
                    name="phone"
                    required
                    value="{{ phone or '' }}"
                    placeholder="请输入 11 位手机号"
                    autocomplete="tel"
                >
            </label>
            <label>
                <span>验证码</span>
                <input
                    type="text"
                    name="code"
                    required
                    inputmode="numeric"
                    maxlength="6"
                    placeholder="6 位验证码"
                    autocomplete="one-time-code"
                >
            </label>
            <div class="auth-button-row">
                <button
                    class="secondary-button"
                    type="submit"
                    formaction="{{ url_for('auth.send_code') }}"
                    formnovalidate
                >
                    获取验证码
                </button>
                <button
                    class="primary-button"
                    type="submit"
                    formaction="{{ url_for('auth.login') }}"
                >
                    登录
                </button>
            </div>
        </form>

        <p class="form-help">开发环境下验证码会打印在 Flask 控制台；上线后可通过环境变量切换阿里云或腾讯云短信。</p>
    </section>
</main>
{% endblock %}
